<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Handstand Fighter</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    color: #e8e0d0;
    font-family: 'Inter', sans-serif;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    position: fixed;
  }

  /* ===== FULLSCREEN CAMERA ===== */
  #game-view {
    position: fixed;
    inset: 0;
    display: none;
  }

  #video { display: none; }

  #pose-canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  /* ===== HUD OVERLAYS ===== */
  #hud-top {
    position: absolute;
    top: 0; left: 0; right: 0;
    /* Extra top/side breathing room so the HUD clears the safe zones
       Reels/TikTok/Shorts overlay their own UI into when this footage
       gets shared as a clip. */
    padding: 56px 28px 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 10;
  }

  #hud-top-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  #session-hud {
    display: inline-flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 3px;
    background: rgba(0,0,0,0.65);
    border: 1px solid #c080ff44;
    border-radius: 10px;
    padding: 7px 12px;
    backdrop-filter: blur(6px);
    width: fit-content;
  }

  #session-mode-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: #c080ff;
    letter-spacing: 1px;
  }

  #session-value-row {
    display: flex;
    align-items: baseline;
    gap: 7px;
  }

  #session-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 0 16px #c080ff88;
    line-height: 1;
  }

  #session-unit {
    font-size: 11px;
    color: #888;
  }

  #kebab-btn {
    flex-shrink: 0;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: rgba(0,0,0,0.65);
    border: 1px solid #ffffff22;
    color: #e8e0d0;
    font-size: 17px;
    line-height: 1;
    cursor: pointer;
    backdrop-filter: blur(6px);
  }
  #kebab-btn:active { transform: scale(0.94); }

  #rec-btn {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    height: 34px;
    border-radius: 17px;
    background: rgba(0,0,0,0.65);
    border: 1px solid #ff4444aa;
    color: #ff4444;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    letter-spacing: 0.5px;
  }
  #rec-btn.recording {
    border-color: #ff4444;
    background: rgba(180,0,0,0.5);
    color: #fff;
    animation: rec-pulse 1s ease-in-out infinite;
  }
  @keyframes rec-pulse {
    0%,100% { box-shadow: 0 0 0 0 #ff444400; }
    50%      { box-shadow: 0 0 0 4px #ff444433; }
  }
  #rec-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: currentColor;
    flex-shrink: 0;
  }

  .lang-toggle {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 6px;
    z-index: 5;
  }
  .lang-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    background: rgba(255,255,255,0.08);
    color: #888;
    border: 1px solid #ffffff22;
    border-radius: 6px;
    padding: 6px 8px;
    cursor: pointer;
  }
  .lang-btn.active { background: #f0c040; color: #0a0a0f; border-color: #f0c040; }

  #status-pill {
    font-size: 10px;
    padding: 5px 12px;
    border-radius: 20px;
    font-weight: 700;
    letter-spacing: 0.5px;
    align-self: flex-start;
  }
  .pill-waiting  { background: rgba(40,40,60,0.85); color: #888; border: 1px solid #333; }
  .pill-detecting{ background: rgba(10,40,10,0.85); color: #4caf50; border: 1px solid #4caf5066; }
  .pill-handstand{ background: rgba(60,40,0,0.85);  color: #f0c040; border: 1px solid #f0c04066; }
  .pill-active   { background: rgba(40,0,80,0.85);  color: #c080ff; border: 1px solid #c080ff66; }

  /* ===== HUD BOTTOM ===== */
  #hud-bottom {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    /* Extra bottom/side breathing room so the HUD clears the caption
       and like/comment/share column social apps overlay at the bottom
       and right edge of vertical clips. */
    padding: 0 28px 72px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    z-index: 10;
    pointer-events: none;
  }

  .hud-stat {
    background: rgba(0,0,0,0.65);
    border: 1px solid #ffffff11;
    border-radius: 8px;
    padding: 6px 10px;
    text-align: center;
    backdrop-filter: blur(4px);
  }
  .hud-stat-val {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #c080ff;
    display: block;
  }
  .hud-stat-lbl { font-size: 8px; color: #888; margin-top: 2px; display: block; }

  /* ===== REP/HOLD FLASH ===== */
  #screen-flash {
    position: absolute;
    inset: 0;
    background: #c080ff33;
    opacity: 0;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.12s;
  }

  /* ===== REP POPUP ===== */
  #rep-popup {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translateX(-50%) scale(0);
    font-family: 'Press Start 2P', monospace;
    font-size: 22px;
    color: #fff;
    text-shadow: 0 0 20px #c080ff, 0 2px 0 #000;
    pointer-events: none;
    z-index: 20;
    opacity: 0;
    transition: transform 0.12s, opacity 0.3s;
    white-space: nowrap;
  }
  #rep-popup.pop {
    transform: translateX(-50%) scale(1);
    opacity: 1;
  }

  /* ===== COUNTDOWN ===== */
  #countdown-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 50;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
  }
  #countdown-overlay.show { display: flex; }

  #countdown-msg {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #f0c040;
    text-align: center;
    line-height: 1.8;
  }
  #countdown-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 80px;
    color: #fff;
    text-shadow: 0 0 40px #c080ff;
    line-height: 1;
  }
  #countdown-sub {
    font-size: 13px;
    color: #aaa;
    text-align: center;
  }

  /* ===== RESULT OVERLAY ===== */
  #result-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    padding: 24px;
    text-align: center;
  }
  #result-overlay.show { display: flex; }

  #result-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    text-align: center;
    line-height: 1.5;
    color: #c080ff;
  }

  #result-value {
    font-family: 'Press Start 2P', monospace;
    font-size: 48px;
    color: #fff;
    text-shadow: 0 0 30px #c080ff;
  }

  #result-record-badge {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    color: #f0c040;
    text-shadow: 0 0 20px #f0c040;
    display: none;
  }
  #result-record-badge.show { display: block; }

  #result-rankup-badge {
    font-size: 12px;
    color: #c080ff;
    display: none;
  }
  #result-rankup-badge.show { display: flex; align-items: center; gap: 8px; }

  #result-stats {
    background: rgba(255,255,255,0.05);
    border: 1px solid #ffffff22;
    border-radius: 12px;
    padding: 16px 28px;
    display: flex;
    gap: 32px;
  }
  .rs { text-align: center; }
  .rs-val { font-family: 'Press Start 2P', monospace; font-size: 18px; color: #c080ff; display: block; margin-bottom: 4px; }
  .rs-lbl { font-size: 11px; color: #888; }

  #next-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    background: #f0c040;
    color: #0a0a0f;
    border: none;
    padding: 16px 32px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #next-btn:active { transform: scale(0.96); }

  /* ===== SHARED FULLSCREEN MENU SCREENS ===== */
  .menu-screen {
    position: fixed;
    inset: 0;
    background: #0a0a0f;
    z-index: 200;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0;
    padding: 24px;
    overflow-y: auto;
  }
  .menu-screen.show { display: flex; }

  .screen-logo {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 5vw, 22px);
    color: #f0c040;
    text-shadow: 0 0 30px #f0c04099;
    text-align: center;
    line-height: 1.7;
    margin-bottom: 28px;
    white-space: nowrap;
  }

  .screen-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #f0c040;
    text-align: center;
    margin-bottom: 24px;
  }

  .big-btn {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    background: #f0c040;
    color: #0a0a0f;
    border: none;
    padding: 18px 36px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 14px;
    width: 100%;
    max-width: 340px;
    transition: opacity 0.15s, transform 0.1s;
  }
  .big-btn:active { transform: scale(0.97); }
  .big-btn.secondary {
    background: transparent;
    color: #e8e0d0;
    border: 1px solid #ffffff33;
  }

  .instr-step {
    width: 100%;
    max-width: 340px;
    background: #0e0e18;
    border: 1px solid #2a2a3a;
    border-radius: 12px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 12px;
  }
  .instr-num {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: #f0c040;
    flex-shrink: 0;
    margin-top: 2px;
  }
  .instr-text { font-size: 13px; color: #ccc; line-height: 1.6; }
  .instr-text b { color: #f0c040; }

  #loading-msg {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    color: #666;
    margin-top: 12px;
    display: none;
    text-align: center;
  }

  /* ===== NICKNAME SCREEN ===== */
  #nickname-input {
    width: 100%;
    max-width: 340px;
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    background: #14141e;
    border: 1px solid #2a2a3a;
    color: #e8e0d0;
    padding: 16px;
    border-radius: 8px;
    margin-bottom: 18px;
    text-align: center;
  }
  #nickname-input:focus { outline: none; border-color: #f0c040; }
  #nickname-hint {
    font-size: 12px;
    color: #888;
    text-align: center;
    margin-bottom: 24px;
    max-width: 320px;
    line-height: 1.5;
  }

  /* ===== PROFILE SCREEN ===== */
  #profile-name {
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: #c080ff;
    text-align: center;
    margin-bottom: 20px;
    word-break: break-word;
  }

  #rank-card {
    width: 100%;
    max-width: 340px;
    background: rgba(255,255,255,0.05);
    border: 1px solid #ffffff22;
    border-radius: 12px;
    padding: 18px;
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  #rank-icon { width: 48px; height: 48px; flex-shrink: 0; }
  #rank-icon.legend-glow {
    animation: legend-pulse 1.6s ease-in-out infinite;
  }
  @keyframes legend-pulse {
    0%, 100% { filter: drop-shadow(0 0 6px #c080ff); }
    50%      { filter: drop-shadow(0 0 18px #ff6090) brightness(1.2); }
  }
  #rank-info { flex: 1; min-width: 0; }
  #rank-label {
    font-family: 'Press Start 2P', monospace;
    font-size: 13px;
    color: #f0c040;
    margin-bottom: 8px;
  }
  #rank-progress-bg {
    background: rgba(255,255,255,0.08);
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  #rank-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #c080ff, #ff6090);
    border-radius: 6px;
    transition: width 0.3s ease;
  }
  #rank-progress-text {
    font-size: 10px;
    color: #888;
    margin-top: 6px;
  }

  .profile-section-title {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    color: #f0c040;
    width: 100%;
    max-width: 340px;
    margin-bottom: 10px;
    margin-top: 6px;
  }

  #profile-badges {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
  }
  .badge-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #0e0e18;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .badge-row.empty { opacity: 0.4; }
  .badge-label { font-size: 12px; color: #ccc; }
  .badge-value { font-family: 'Press Start 2P', monospace; font-size: 13px; color: #f0c040; }

  #profile-achievements {
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 24px;
  }
  .ach-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #0e0e18;
    border: 1px solid #2a2a3a;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .ach-row.locked { opacity: 0.35; }
  .ach-icon { font-size: 20px; flex-shrink: 0; }
  .ach-label { font-size: 12px; color: #ccc; }

  /* ===== IN-GAME MENU OVERLAY ===== */
  #ingame-menu-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 150;
    display: none;
    align-items: center;
    justify-content: center;
  }
  #ingame-menu-overlay.show { display: flex; }

  #ingame-menu-box {
    background: #0e0e18;
    border: 1px solid #2a2a3a;
    border-radius: 14px;
    padding: 22px;
    width: 100%;
    max-width: 300px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
</style>
</head>
<body>

<!-- NICKNAME SCREEN -->
<div id="nickname-screen" class="menu-screen">
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="ru" onclick="applyLanguage('ru')">RU</button>
    <button class="lang-btn" data-lang="en" onclick="applyLanguage('en')">EN</button>
  </div>
  <div class="screen-logo">HANDSTAND FIGHTER</div>
  <div id="nickname-hint"></div>
  <input id="nickname-input" type="text" maxlength="20">
  <button class="big-btn" id="nickname-confirm-btn" onclick="onNicknameConfirm()"></button>
</div>

<!-- MAIN MENU -->
<div id="menu-screen" class="menu-screen">
  <div class="lang-toggle">
    <button class="lang-btn" data-lang="ru" onclick="applyLanguage('ru')">RU</button>
    <button class="lang-btn" data-lang="en" onclick="applyLanguage('en')">EN</button>
  </div>
  <div class="screen-logo">HANDSTAND FIGHTER</div>
  <button class="big-btn" id="menu-play-btn" onclick="showOverlayScreen('mode-screen')"></button>
  <button class="big-btn secondary" id="menu-profile-btn" onclick="openProfile('menu')"></button>
  <button class="big-btn secondary" id="menu-instr-btn" onclick="openInstructions('menu')"></button>
</div>

<!-- MODE SELECT -->
<div id="mode-screen" class="menu-screen">
  <div class="screen-title" id="mode-title"></div>
  <button class="big-btn" id="mode-reps-btn" onclick="selectMode('reps')"></button>
  <button class="big-btn" id="mode-hold-btn" onclick="selectMode('hold')"></button>
  <button class="big-btn secondary" id="mode-back-btn" onclick="showOverlayScreen('menu-screen')"></button>
</div>

<!-- INSTRUCTION SCREEN -->
<div id="instr-screen" class="menu-screen">
  <div class="screen-title" id="instr-title"></div>

  <div class="instr-step">
    <span class="instr-num">1</span>
    <span class="instr-text" id="instr-step-1"></span>
  </div>
  <div class="instr-step">
    <span class="instr-num">2</span>
    <span class="instr-text" id="instr-step-2"></span>
  </div>
  <div class="instr-step">
    <span class="instr-num">3</span>
    <span class="instr-text" id="instr-step-3"></span>
  </div>
  <div class="instr-step">
    <span class="instr-num">4</span>
    <span class="instr-text" id="instr-step-4"></span>
  </div>
  <div class="instr-step">
    <span class="instr-num">5</span>
    <span class="instr-text" id="instr-step-5"></span>
  </div>

  <button class="big-btn" id="instr-back-btn" onclick="closeOverlayScreen()"></button>
  <div id="loading-msg"></div>
</div>

<!-- PROFILE SCREEN -->
<div id="profile-screen" class="menu-screen">
  <div class="screen-title" id="profile-title"></div>
  <div id="profile-name">Игрок</div>

  <div id="rank-card">
    <div id="rank-icon"></div>
    <div id="rank-info">
      <div id="rank-label"></div>
      <div id="rank-progress-bg"><div id="rank-progress-bar" style="width:0%"></div></div>
      <div id="rank-progress-text"></div>
    </div>
  </div>

  <div class="profile-section-title" id="profile-badges-title"></div>
  <div id="profile-badges"></div>

  <div class="profile-section-title" id="profile-achievements-title"></div>
  <div id="profile-achievements"></div>

  <button class="big-btn" id="profile-back-btn" onclick="closeOverlayScreen()"></button>
</div>

<!-- GAME VIEW (fullscreen camera) -->
<div id="game-view">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="pose-canvas"></canvas>
  <div id="screen-flash"></div>

  <!-- TOP HUD -->
  <div id="hud-top">
    <div id="hud-top-row">
      <div id="session-hud">
        <div id="session-mode-label"></div>
        <div id="session-value-row">
          <span id="session-value">0</span>
          <span id="session-unit"></span>
        </div>
      </div>
      <button id="rec-btn" onclick="toggleRecording()"><span id="rec-dot"></span><span id="rec-label">REC</span></button>
      <button id="kebab-btn" onclick="openIngameMenu()">⋮</button>
    </div>
    <span class="status-pill pill-waiting" id="status-pill"></span>
  </div>

  <!-- BOTTOM HUD -->
  <div id="hud-bottom">
    <div class="hud-stat">
      <span class="hud-stat-val" id="stat-record">0</span>
      <span class="hud-stat-lbl" id="stat-record-lbl"></span>
    </div>
    <div class="hud-stat">
      <span class="hud-stat-val" id="stat-points">0</span>
      <span class="hud-stat-lbl" id="stat-points-lbl"></span>
    </div>
    <div class="hud-stat">
      <span class="hud-stat-val" id="stat-rank">-</span>
      <span class="hud-stat-lbl" id="stat-rank-lbl"></span>
    </div>
  </div>

  <!-- REP POPUP -->
  <div id="rep-popup">+1</div>
</div>

<!-- IN-GAME MENU -->
<div id="ingame-menu-overlay">
  <div id="ingame-menu-box">
    <button class="big-btn secondary" id="ingame-profile-btn" onclick="openProfile('game')"></button>
    <button class="big-btn secondary" id="ingame-how-btn" onclick="openInstructions('game')"></button>
    <button class="big-btn secondary" id="ingame-mainmenu-btn" onclick="goMainMenuFromGame()"></button>
    <button class="big-btn" id="ingame-resume-btn" onclick="resumeFromIngameMenu()"></button>
  </div>
</div>

<!-- COUNTDOWN -->
<div id="countdown-overlay">
  <div id="countdown-msg"></div>
  <div id="countdown-num">5</div>
  <div id="countdown-sub"></div>
</div>

<!-- RESULT -->
<div id="result-overlay">
  <div id="result-title"></div>
  <div id="result-value">0</div>
  <div id="result-stats">
    <div class="rs">
      <span class="rs-val" id="res-value-lbl-val"></span>
    </div>
  </div>
  <div id="result-record-badge"></div>
  <div id="result-rankup-badge">
    <div id="result-rankup-icon" style="width:28px;height:28px;"></div>
    <span id="result-rankup-text"></span>
  </div>
  <button id="next-btn" onclick="nextRound()"></button>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>

<script>
// ===================== PIXEL ART RENDERER =====================
// Generic renderer for any { grid, palette } pixel-art definition.
// grid: array of equal-length strings, '.' = transparent, any other
// char is a key into palette mapping to a CSS color.
function renderPixelArt(def, size) {
  const grid = def.grid, palette = def.palette;
  const cols = grid[0].length, rows = grid.length;
  const unit = size / cols;
  let rects = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      const c = grid[y][x];
      if (c === '.') continue;
      rects += `<rect x="${(x*unit).toFixed(2)}" y="${(y*unit).toFixed(2)}" width="${unit.toFixed(2)}" height="${unit.toFixed(2)}" fill="${palette[c]}"/>`;
    }
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="100%" height="100%" shape-rendering="crispEdges">${rects}</svg>`;
}

function getRank(points) {
  let rank = RANKS[0];
  for (const r of RANKS) { if (points >= r.min) rank = r; else break; }
  return rank;
}
function getNextRank(rank) {
  const idx = RANKS.findIndex(r => r.id === rank.id);
  return RANKS[idx + 1] || null;
}

function pixelIcon(key, size) {
  size = size || 16;
  const grid = ICONS[key];
  const cols = grid[0].length, rows = grid.length;
  const unit = size / cols;
  let rects = '';
  for (let y = 0; y < rows; y++) {
    for (let x = 0; x < cols; x++) {
      if (grid[y][x] !== '#') continue;
      rects += `<rect x="${(x*unit).toFixed(2)}" y="${(y*unit).toFixed(2)}" width="${unit.toFixed(2)}" height="${unit.toFixed(2)}" fill="currentColor"/>`;
    }
  }
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="display:inline-block;vertical-align:-3px;margin-right:6px;flex-shrink:0;" shape-rendering="crispEdges">${rects}</svg>`;
}

// ===================== PROFILE (persisted) =====================
const PROFILE_KEY = 'hf_profile';

function loadProfile() {
  try {
    const raw = localStorage.getItem(PROFILE_KEY);
    if (!raw) return null;
    const p = JSON.parse(raw);
    if (!p.nickname) return null;
    p.totalReps = p.totalReps || 0;
    p.totalHoldSeconds = p.totalHoldSeconds || 0;
    p.bestRepsSession = p.bestRepsSession || null;
    p.bestHoldSession = p.bestHoldSession || null;
    return p;
  } catch (e) { return null; }
}

function saveProfile() {
  localStorage.setItem(PROFILE_KEY, JSON.stringify(profile));
}

// ===================== NAVIGATION =====================
const OVERLAY_SCREENS = ['nickname-screen', 'menu-screen', 'mode-screen', 'instr-screen', 'profile-screen'];

function showOverlayScreen(id) {
  OVERLAY_SCREENS.forEach(s => $(s).classList.remove('show'));
  $(id).classList.add('show');
}

function hideOverlayScreens() {
  OVERLAY_SCREENS.forEach(s => $(s).classList.remove('show'));
}

function closeOverlayScreen() {
  hideOverlayScreens();
  if (returnTo === 'game') {
    $('game-view').style.display = 'block';
    gameActive = pausedGameActive;
  } else {
    showOverlayScreen('menu-screen');
  }
}

function openInstructions(from) {
  returnTo = from;
  if (from === 'game') {
    pausedGameActive = gameActive;
    gameActive = false;
    closeIngameMenu();
  }
  showOverlayScreen('instr-screen');
}

function openProfile(from) {
  returnTo = from;
  if (from === 'game') {
    pausedGameActive = gameActive;
    gameActive = false;
    closeIngameMenu();
  }
  renderProfile();
  showOverlayScreen('profile-screen');
}

function badgeIsActive(badge) {
  return badge && (Date.now() - badge.ts) <= THIRTY_DAYS_MS;
}

function renderProfile() {
  $('profile-name').textContent = profile.nickname;

  const points = profile.totalReps + profile.totalHoldSeconds;
  const rank = getRank(points);
  const next = getNextRank(rank);
  $('rank-icon').innerHTML = renderPixelArt(rank, 48);
  $('rank-icon').className = rank.id === 'legend' ? 'legend-glow' : '';
  $('rank-label').textContent = rankLabel(rank);
  $('rank-progress-bar').style.width = (next ? Math.min(100, (points - rank.min) / (next.min - rank.min) * 100) : 100) + '%';
  $('rank-progress-text').textContent = t('rankProgress')(points, next);

  const badgesEl = $('profile-badges');
  badgesEl.innerHTML = '';
  badgesEl.appendChild(badgeRow(t('badgeReps'), profile.bestRepsSession, t('resultUnitReps')));
  badgesEl.appendChild(badgeRow(t('badgeHold'), profile.bestHoldSession, t('resultUnitHold')));

  const achEl = $('profile-achievements');
  achEl.innerHTML = '';
  REP_MILESTONES.forEach(n => {
    achEl.appendChild(achRow('dumbbell', t('achReps')(n), profile.totalReps >= n));
  });
  HOLD_MILESTONES.forEach(n => {
    achEl.appendChild(achRow('hourglass', t('achHold')(n), profile.totalHoldSeconds >= n));
  });
}

function badgeRow(label, badge, unit) {
  const row = document.createElement('div');
  const active = badgeIsActive(badge);
  row.className = 'badge-row' + (active ? '' : ' empty');
  const value = active ? `${badge.value} ${unit}` : t('badgeEmpty');
  row.innerHTML = `<span class="badge-label">${label}</span><span class="badge-value">${value}</span>`;
  return row;
}

function achRow(iconKey, label, unlocked) {
  const row = document.createElement('div');
  row.className = 'ach-row' + (unlocked ? '' : ' locked');
  const icon = pixelIcon(unlocked ? iconKey : 'lock', 18);
  row.innerHTML = `<span class="ach-icon">${icon}</span><span class="ach-label">${label}</span>`;
  return row;
}

// ===================== NICKNAME =====================
function onNicknameConfirm() {
  const name = $('nickname-input').value.trim();
  if (!name) {
    $('nickname-input').focus();
    return;
  }
  profile = { nickname: name, totalReps: 0, totalHoldSeconds: 0, bestRepsSession: null, bestHoldSession: null };
  saveProfile();
  showOverlayScreen('menu-screen');
}

// ===================== MODE / SESSION =====================
function selectMode(mode) {
  sessionMode = mode;
  goPlay();
}

function resetSessionCounters() {
  sessionReps = 0;
  sessionHoldSeconds = 0;
  holdConfirmedAt = null;
  isHandstand = false;
  handstandStartTime = null;
  repPhase = 'top';
  sessionValueEl.textContent = '0';
  sessionModeLabelEl.textContent = sessionMode === 'reps' ? t('sessionLabelReps') : t('sessionLabelHold');
  $('session-unit').textContent = sessionMode === 'reps' ? t('sessionUnitReps') : t('sessionUnitHold');
  refreshHudStats();
}

function refreshHudStats() {
  const badge = sessionMode === 'reps' ? profile.bestRepsSession : profile.bestHoldSession;
  $('stat-record').textContent = badgeIsActive(badge) ? badge.value : 0;
  $('stat-record-lbl').textContent = t('statRecord');
  const points = profile.totalReps + profile.totalHoldSeconds;
  $('stat-points').textContent = points;
  $('stat-points-lbl').textContent = t('statPoints');
  $('stat-rank').textContent = rankLabel(getRank(points));
  $('stat-rank-lbl').textContent = t('statRank');
}

function onRep() {
  sessionReps++;
  sessionValueEl.textContent = sessionReps;

  screenFlash.style.opacity = '1';
  setTimeout(() => { screenFlash.style.opacity = '0'; }, 120);
  repPopup.textContent = '+1';
  repPopup.classList.add('pop');
  setTimeout(() => repPopup.classList.remove('pop'), 400);
}

function finalizeSession() {
  gameActive = false;

  const beforePoints = profile.totalReps + profile.totalHoldSeconds;
  const rankBefore = getRank(beforePoints);

  let value;
  if (sessionMode === 'reps') {
    value = sessionReps;
    profile.totalReps += value;
  } else {
    value = Math.round(sessionHoldSeconds);
    profile.totalHoldSeconds += value;
  }

  const badgeKey = sessionMode === 'reps' ? 'bestRepsSession' : 'bestHoldSession';
  const badge = profile[badgeKey];
  const isNewRecord = !badgeIsActive(badge) || value > badge.value;
  if (isNewRecord) profile[badgeKey] = { value, ts: Date.now() };

  saveProfile();

  const afterPoints = profile.totalReps + profile.totalHoldSeconds;
  const rankAfter = getRank(afterPoints);
  const rankedUp = rankAfter.id !== rankBefore.id;

  showResult(value, isNewRecord, rankedUp ? rankAfter : null);
}

function showResult(value, isNewRecord, rankedUpTo) {
  resultTitle.textContent = t('resultTitle');
  $('result-value').textContent = value;
  $('res-value-lbl-val').textContent = sessionMode === 'reps' ? t('resultUnitReps') : t('resultUnitHold');

  const recordBadge = $('result-record-badge');
  recordBadge.classList.toggle('show', isNewRecord);
  if (isNewRecord) {
    recordBadge.innerHTML = pixelIcon('star', 16) + t('newRecord');
  }

  const rankupBadge = $('result-rankup-badge');
  if (rankedUpTo) {
    $('result-rankup-icon').innerHTML = renderPixelArt(rankedUpTo, 28);
    $('result-rankup-text').textContent = t('rankUp')(rankLabel(rankedUpTo));
    rankupBadge.classList.add('show');
  } else {
    rankupBadge.classList.remove('show');
  }

  $('next-btn').textContent = t('nextBtn');
  resultOverlay.classList.add('show');
}

function nextRound() {
  resultOverlay.classList.remove('show');
  resetSessionCounters();
  startCountdown();

// ===================== STATUS =====================
let lastStatus = 'waiting';
function setStatus(s) {
  lastStatus = s;
  statusPill.className = 'status-pill';
  if (s === 'waiting')   { statusPill.classList.add('pill-waiting');   statusPill.innerHTML = pixelIcon('hourglass') + t('statusWaiting'); }
  if (s === 'detecting') { statusPill.classList.add('pill-detecting'); statusPill.innerHTML = pixelIcon('check') + t('statusDetecting'); }
  if (s === 'handstand') { statusPill.classList.add('pill-handstand'); statusPill.innerHTML = pixelIcon('arrowUp') + t('statusHandstand'); }
  if (s === 'active') {
    statusPill.classList.add('pill-active');
    statusPill.innerHTML = sessionMode === 'reps'
      ? pixelIcon('dumbbell') + t('statusReps')
      : pixelIcon('hourglass') + t('statusHold');
  }
}

// ===================== COUNTDOWN =====================
function startCountdown() {
  countdownOverlay.classList.add('show');
  let n = 5;
  countdownNum.textContent = n;
  const timer = setInterval(() => {
    n--;
    countdownNum.textContent = n;
    if (n <= 0) {
      clearInterval(timer);
      countdownOverlay.classList.remove('show');
      gameActive = true;
      setStatus('waiting');
    }
  }, 1000);
}

// ===================== START =====================
function goPlay() {
  hideOverlayScreens();
  resetSessionCounters();

  if (cameraStarted) {
    // Camera already running — just start a fresh session.
    $('game-view').style.display = 'block';
    startCountdown();
    return;
  }

  $('loading-msg').style.display = 'block';
  showOverlayScreen('instr-screen');
  $('instr-back-btn').style.display = 'none';

  const pose = new Pose({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${f}` });
  pose.setOptions({ modelComplexity: 1, smoothLandmarks: true, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
  pose.onResults(onResults);

  // Use back camera — try exact first, fallback to ideal
  const tryCamera = (constraints) =>
    navigator.mediaDevices.getUserMedia({ video: constraints, audio: false });

  tryCamera({ facingMode: { exact: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } })
    .catch(() => tryCamera({ facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } }))
    .catch(() => tryCamera({ width: { ideal: 1280 }, height: { ideal: 720 } }))
    .then(stream => {
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;

      hideOverlayScreens();
      $('instr-back-btn').style.display = 'block';
      $('loading-msg').style.display = 'none';
      $('game-view').style.display = 'block';
      cameraStarted = true;

      video.play();

      // Manual frame loop (avoid mediapipe Camera helper — it re-requests
      // getUserMedia internally and overrides our back-camera stream with
      // the default front-facing camera).
      let sending = false;
      async function frameLoop() {
        if (!sending) {
          sending = true;
          await pose.send({ image: video });
          sending = false;
        }
        requestAnimationFrame(frameLoop);
      }
      requestAnimationFrame(frameLoop);

      startCountdown();
    };
  }).catch(err => {
    $('loading-msg').textContent = t('noCameraAccess');
    console.error(err);
  });
}

// ===================== POSE DETECTION =====================
function angle3(a, b, c) {
  const ab = { x: a.x - b.x, y: a.y - b.y };
  const cb = { x: c.x - b.x, y: c.y - b.y };
  const dot = ab.x*cb.x + ab.y*cb.y;
  const mag = Math.sqrt((ab.x**2+ab.y**2)*(cb.x**2+cb.y**2));
  if (!mag) return 180;
  return Math.acos(Math.min(1,Math.max(-1,dot/mag))) * 180/Math.PI;
}

function onResults(results) {
  // Resize canvas to fill screen
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  ctx.save();
  // Draw video covering full canvas (object-fit: cover style)
  const vw = results.image.width || video.videoWidth || 1280;
  const vh = results.image.height || video.videoHeight || 720;
  const cw = canvas.width, ch = canvas.height;
  const scale = Math.max(cw/vw, ch/vh);
  const dw = vw*scale, dh = vh*scale;
  const dx = (cw-dw)/2, dy = (ch-dh)/2;
  ctx.drawImage(results.image, dx, dy, dw, dh);

  // Dim overlay
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(0,0,cw,ch);

  if (results.poseLandmarks) {
    // Draw skeleton — skip face/head landmarks (0–10), only body
    const bodyConnections = POSE_CONNECTIONS.filter(([a,b]) => a >= 11 && b >= 11);
    const bodyLandmarks = results.poseLandmarks.map((lm, i) => i >= 11 ? lm : null).filter(Boolean);
    // Remap connections to bodyLandmarks indices (landmark i → i-11)
    const remappedConnections = bodyConnections.map(([a,b]) => [a-11, b-11]);
    drawConnectors(ctx, bodyLandmarks, remappedConnections, { color: '#c080ff55', lineWidth: 3 });
    drawLandmarks(ctx, bodyLandmarks, { color: '#c080ff', lineWidth: 1, radius: 4 });
  }

  ctx.restore();
  drawRecFrame(results.image);

  if (!results.poseLandmarks) {
    if (gameActive) setStatus('waiting');
    return;
  }

  const lm = results.poseLandmarks;

  // Require key body landmarks visible (shoulders, hips, ankles, wrists)
  const keyIds = [11, 12, 23, 24, 27, 28, 15, 16];
  const bodyVisible = keyIds.every(i => lm[i] && (lm[i].visibility ?? 1) > 0.4);
  if (!bodyVisible) {
    if (gameActive) setStatus('waiting');
    return;
  }

  setStatus('detecting');

  if (!gameActive) return;

  const lShoulder = lm[11], rShoulder = lm[12];
  const lElbow = lm[13], rElbow = lm[14];
  const lWrist = lm[15], rWrist = lm[16];
  const lHip = lm[23], rHip = lm[24];
  const lAnkle = lm[27], rAnkle = lm[28];

  const wristY   = (lWrist.y  + rWrist.y)   / 2;
  const ankleY   = (lAnkle.y  + rAnkle.y)   / 2;
  const hipY     = (lHip.y    + rHip.y)     / 2;
  const shoulderY= (lShoulder.y + rShoulder.y) / 2;

  const inverted = ankleY < shoulderY && wristY > hipY;

  if (inverted) {
    if (!handstandStartTime) handstandStartTime = Date.now();
    if (Date.now() - handstandStartTime > HANDSTAND_CONFIRM_MS) {
      if (!isHandstand) holdConfirmedAt = Date.now();
      isHandstand = true;
      setStatus('active');
    } else {
      setStatus('handstand');
    }
  } else {
    if (isHandstand) { finalizeSession(); return; }
    isHandstand = false;
    handstandStartTime = null;
    setStatus('detecting');
  }

  if (isHandstand && sessionMode === 'hold') {
    sessionHoldSeconds = (Date.now() - holdConfirmedAt) / 1000;
    sessionValueEl.textContent = Math.floor(sessionHoldSeconds);
  }

  if (isHandstand && sessionMode === 'reps') {
    const ea = Math.min(
      angle3(lShoulder, lElbow, lWrist),
      angle3(rShoulder, rElbow, rWrist)
    );

    if (repPhase === 'top' && ea < REP_DOWN)  repPhase = 'bottom';
    if (repPhase === 'bottom' && ea > REP_UP) { repPhase = 'top'; onRep(); }

    // Angle label on canvas
    const ex = lElbow.x * canvas.width;
    const ey = lElbow.y * canvas.height;
    ctx.font = 'bold 20px Inter';
    ctx.fillStyle = ea < REP_DOWN ? '#c080ff' : '#f0c040';
    ctx.fillText(Math.round(ea) + '°', ex + 8, ey);
  }
}

// ===================== LANGUAGE =====================
function applyLanguage(lang) {
  LANG = lang;
  localStorage.setItem('hf_lang', lang);
  document.documentElement.lang = lang;

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });

  $('nickname-hint').textContent = t('nicknameHint');
  $('nickname-input').placeholder = t('nicknamePlaceholder');
  $('nickname-confirm-btn').textContent = t('btnContinue');

  $('menu-play-btn').textContent = t('btnPlay');
  $('menu-profile-btn').textContent = t('btnProfile');
  $('menu-instr-btn').textContent = t('btnInstructions');

  $('mode-title').textContent = t('modeTitle');
  $('mode-reps-btn').textContent = t('modeReps');
  $('mode-hold-btn').textContent = t('modeHold');
  $('mode-back-btn').textContent = t('btnBack');

  $('instr-title').textContent = t('instrTitle');
  t('instrSteps').forEach((html, i) => { $('instr-step-' + (i + 1)).innerHTML = html; });
  $('instr-back-btn').textContent = t('btnBack');
  $('loading-msg').textContent = t('loadingCamera');

  $('profile-title').textContent = t('profileTitle');
  $('profile-badges-title').textContent = t('sectionBadges');
  $('profile-achievements-title').textContent = t('sectionAchievements');
  $('profile-back-btn').textContent = t('btnBack');

  $('ingame-profile-btn').textContent = t('ingameProfile');
  $('ingame-how-btn').textContent = t('ingameHow');
  $('ingame-mainmenu-btn').textContent = t('ingameMainMenu');
  $('ingame-resume-btn').textContent = t('ingameResume');

  $('countdown-msg').innerHTML = pixelIcon('phone', 20) + t('countdownMsg');
  $('countdown-sub').textContent = t('countdownSub');

  if (cameraStarted) {
    sessionModeLabelEl.textContent = sessionMode === 'reps' ? t('sessionLabelReps') : t('sessionLabelHold');
    $('session-unit').textContent = sessionMode === 'reps' ? t('sessionUnitReps') : t('sessionUnitHold');
    refreshHudStats();
    setStatus(lastStatus);
  }
  if ($('profile-screen').classList.contains('show')) renderProfile();
}

// ===================== RECORDING =====================
let mediaRecorder = null;
let recChunks = [];
const recCanvas = document.createElement('canvas');
recCanvas.width = 1080;
recCanvas.height = 1920;
const recCtx = recCanvas.getContext('2d');

function toggleRecording() {
  if (mediaRecorder && mediaRecorder.state === 'recording') {
    mediaRecorder.stop();
  } else {
    startRecording();
  }
}

function startRecording() {
  recChunks = [];
  const stream = recCanvas.captureStream(30);
  const mimeType = ['video/mp4', 'video/webm;codecs=h264', 'video/webm'].find(t => MediaRecorder.isTypeSupported(t)) || '';
  mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : {});
  mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(recChunks, { type: mediaRecorder.mimeType || 'video/webm' });
    const ext = blob.type.includes('mp4') ? 'mp4' : 'webm';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `handstand-${Date.now()}.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    setRecUI(false);
  };
  mediaRecorder.start();
  setRecUI(true);
}

function setRecUI(active) {
  const btn = $('rec-btn');
  btn.classList.toggle('recording', active);
  $('rec-label').textContent = active ? 'STOP' : 'REC';
}

// Called each frame from onResults to composite video+skeleton onto recCanvas at 1080x1920
function drawRecFrame(image) {
  if (!mediaRecorder || mediaRecorder.state !== 'recording') return;
  // Scale video to fill 1080x1920 (object-fit: cover)
  const vw = image.width || 1280, vh = image.height || 720;
  const rw = recCanvas.width, rh = recCanvas.height;
  const scale = Math.max(rw / vw, rh / vh);
  const dw = vw * scale, dh = vh * scale;
  const dx = (rw - dw) / 2, dy = (rh - dh) / 2;
  recCtx.drawImage(image, dx, dy, dw, dh);
  // Copy the skeleton overlay from the display canvas, scaled to 1080x1920
  recCtx.drawImage(canvas, 0, 0, rw, rh);
}

// ===================== BOOT =====================
applyLanguage(LANG);

if (profile) {
  showOverlayScreen('menu-screen');
} else {
  showOverlayScreen('nickname-screen');
}
